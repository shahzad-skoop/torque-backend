version: "3.9"

services:
  api:
    build: .
    container_name: torque_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./:/app
    command: bash -lc "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build: .
    container_name: torque_worker
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
    command: celery -A app.celery_app.celery_app worker --loglevel=info

  beat:
    build: .
    container_name: torque_beat
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
    command: celery -A app.celery_app.celery_app beat --loglevel=info

  postgres:
    image: postgis/postgis:16-3.4
    container_name: torque_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-torque_backend}
      POSTGRES_USER: ${POSTGRES_USER:-torque}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-torque}
    ports:
      - "5432:5432"
    volumes:
      - torque_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-torque} -d ${POSTGRES_DB:-torque_backend}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    container_name: torque_redis
    ports:
      - "6379:6379"
    volumes:
      - torque_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: torque_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - torque_minio_data:/data

  createbuckets:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    container_name: torque_createbuckets
    depends_on:
      - minio
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/${MINIO_BUCKET} || true;
      exit 0;
      "

volumes:
  torque_postgres_data:
  torque_redis_data:
  torque_minio_data:
